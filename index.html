<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Fechamento de Sócios</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
margin-top:40px;
border-radius:6px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
text-align:center;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
font-size:14px;
border:1px solid #ccc;
border-radius:4px;
}

.resultado{
background:#f9f9f9;
padding:20px;
border-radius:5px;
margin-top:20px;
}

.linha{
display:flex;
justify-content:space-between;
margin-bottom:8px;
}

.total{
font-weight:bold;
font-size:17px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
background:black;
color:white;
border:none;
font-size:15px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<h1>PLANETA DOS RETROVISORES</h1>

<h2>Retirada dos Sócios</h2>

<div class="grid">

<div>
<label>Sócio 1 retirou</label>
<input type="number" id="retirada1" value="0">
</div>

<div>
<label>Sócio 2 retirou</label>
<input type="number" id="retirada2" value="0">
</div>

</div>

<h2>Dados do mês</h2>

<div class="grid">

<div>
<label>Total de Entradas</label>
<input type="number" id="entradas" value="0">
</div>

<div>
<label>Despesas Fixas</label>
<input type="number" id="despesas" value="0">
</div>

<div>
<label>Dívidas Pagas</label>
<input type="number" id="dividas" value="0">
</div>

<div>
<label>Mês</label>
<input type="text">
</div>

</div>

<div class="resultado">

<h3>Resultado da Empresa</h3>

<div class="linha">
<span>Lucro Líquido</span>
<span id="lucro">0</span>
</div>

</div>

<div class="resultado">

<h3>Sócio 1 (70%)</h3>

<div class="linha"><span>Parte do lucro</span><span id="lucro1">0</span></div>
<div class="linha"><span>Despesas fixas</span><span id="desp1">0</span></div>
<div class="linha"><span>Dívidas pagas</span><span id="div1">0</span></div>
<div class="linha"><span>Retirada</span><span id="ret1">0</span></div>

<div class="linha total">
<span>Saldo final</span>
<span id="final1">0</span>
</div>

</div>

<div class="resultado">

<h3>Sócio 2 (30%)</h3>

<div class="linha"><span>Parte do lucro</span><span id="lucro2">0</span></div>
<div class="linha"><span>Despesas fixas</span><span id="desp2">0</span></div>
<div class="linha"><span>Dívidas pagas</span><span id="div2">0</span></div>
<div class="linha"><span>Retirada</span><span id="ret2">0</span></div>

<div class="linha total">
<span>Saldo final</span>
<span id="final2">0</span>
</div>

</div>

<button onclick="window.print()">GERAR RELATÓRIO PDF</button>

</div>

  <script>

function parseBR(valor){
if(!valor) return 0;
valor = valor.toString()
.replace(/\./g,"")
.replace(",",".");
return Number(valor);
}

function moeda(v){
return v.toLocaleString("pt-BR",{minimumFractionDigits:2, maximumFractionDigits:2});
}

function calcular(){

let entradas = parseBR(document.getElementById("entradas").value);
let despesas = parseBR(document.getElementById("despesas").value);
let dividas = parseBR(document.getElementById("dividas").value);

let retirada1 = parseBR(document.getElementById("retirada1").value);
let retirada2 = parseBR(document.getElementById("retirada2").value);

let lucro = entradas - despesas - dividas;

let lucro1 = lucro * 0.7;
let lucro2 = lucro * 0.3;

let desp1 = despesas / 2;
let desp2 = despesas / 2;

let div1 = dividas * 0.7;
let div2 = dividas * 0.3;

let final1 = lucro1 - desp1 - div1 - retirada1;
let final2 = lucro2 - desp2 - div2 - retirada2;

document.getElementById("lucro").innerText = moeda(lucro);

document.getElementById("lucro1").innerText = moeda(lucro1);
document.getElementById("lucro2").innerText = moeda(lucro2);

document.getElementById("desp1").innerText = moeda(desp1);
document.getElementById("desp2").innerText = moeda(desp2);

document.getElementById("div1").innerText = moeda(div1);
document.getElementById("div2").innerText = moeda(div2);

document.getElementById("ret1").innerText = moeda(retirada1);
document.getElementById("ret2").innerText = moeda(retirada2);

let saldo1 = document.getElementById("final1");
let saldo2 = document.getElementById("final2");

saldo1.innerText = moeda(final1);
saldo2.innerText = moeda(final2);

saldo1.style.color = final1 >= 0 ? "green" : "red";
saldo2.style.color = final2 >= 0 ? "green" : "red";

}

document.addEventListener("input", calcular);

</script>

</body>
</html>
